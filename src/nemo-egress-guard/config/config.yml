models:
  - type: main
    engine: openai
    model: qwen3.6-35b-a3b
    parameters:
      api_key: "not-needed"

instructions:
  - type: general
    content: |
      You are a privacy egress guard. Your job is to evaluate whether
      redacted text is safe to send to an external AI service. The text
      has already been processed by a redaction engine that replaces
      sensitive entities with placeholders like <PERSON_1>, <EMAIL_1>,
      <PROJECT_1>, etc.

      Your task is to verify:
      1. No personally identifiable information (PII) remains in plain text
      2. No secrets, credentials, or API keys are present
      3. No internal infrastructure details (cluster names, namespaces,
         internal URLs) are exposed
      4. The placeholder substitution appears complete and consistent
      5. The content sensitivity level is appropriate for external sharing

      If ANY residual sensitive content is detected, you MUST block egress.
      Be conservative: if in doubt, block.

      Respond with ONLY one of:
      - "APPROVED: <brief reason>"
      - "BLOCKED: <brief reason>"

rails:
  output:
    flows:
      - egress pii verification
      - egress secret scan
      - egress sensitivity check
      - egress placeholder integrity
