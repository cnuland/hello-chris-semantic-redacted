# Sensitivity Classifier Configuration
# Used by SensitivityClassifier in classifier.py

model:
  name: "all-MiniLM-L6-v2"
  path: "cnuland/semantic-routing-sensitivity"
  top_k: 3
  confidence_threshold: 0.35

