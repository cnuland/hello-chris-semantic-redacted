apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal
  namespace: semantic-redacted
  labels:
    app.kubernetes.io/part-of: semantic-redacted
    app.kubernetes.io/managed-by: kubectl
    policy-type: internal
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # Allow DNS resolution via openshift-dns namespace and ClusterIP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns
      ports:
        - protocol: UDP
          port: 5353
        - protocol: TCP
          port: 5353
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    - to:
        - ipBlock:
            cidr: 172.30.0.10/32
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 5353
        - protocol: TCP
          port: 5353

    # Allow intra-namespace communication (all pods in semantic-redacted)
    - to:
        - podSelector: {}

    # Allow communication to homelab-maas namespace (Qwen model + router)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: homelab-maas
      ports:
        - protocol: TCP
          port: 11434
        - protocol: TCP
          port: 8080

    # Allow Kubernetes API access
    - to:
        - ipBlock:
            cidr: 172.30.0.1/32
      ports:
        - protocol: TCP
          port: 6443
