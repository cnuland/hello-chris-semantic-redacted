apiVersion: v1
kind: ConfigMap
metadata:
  name: redaction-service-config
  namespace: semantic-redacted
  labels:
    app: redaction-service
    app.kubernetes.io/name: redaction-service
    app.kubernetes.io/component: redaction
    app.kubernetes.io/part-of: semantic-redacted
    app.kubernetes.io/managed-by: kubectl
data:
  config.yaml: |
    presidio:
      analyzer:
        supported_entities:
          - PERSON
          - EMAIL_ADDRESS
          - PHONE_NUMBER
          - US_SSN
          - CREDIT_CARD
          - IP_ADDRESS
          - DATE_TIME
          - LOCATION
          - ORGANIZATION
          - URL
        score_threshold: 0.5
        nlp_engine: "spacy"
        spacy_model: "en_core_web_sm"

      custom_recognizers:
        - entity: CLUSTER_NAME
          patterns:
            - regex: "\\b[\\w-]+\\.cjlabs\\.dev\\b"
              score: 0.9
            - regex: "\\b[\\w-]+\\.[\\w-]+\\.svc\\.cluster\\.local\\b"
              score: 0.95
        - entity: K8S_NAMESPACE
          deny_list:
            - "homelab-maas"
            - "home-assistant"
            - "semantic-redacted"
            - "voice"
            - "n8n"
            - "keycloak"
          score: 0.85
        - entity: EMPLOYEE_ID
          patterns:
            - regex: "\\b(EMP|E)-\\d{4,6}\\b"
              score: 0.9
        - entity: INTERNAL_URL
          patterns:
            - regex: "\\bhttps?://[\\w.-]+\\.internal[/\\w.-]*\\b"
              score: 0.9
            - regex: "\\bhttps?://[\\w.-]+\\.svc\\.cluster\\.local[/\\w.-]*\\b"
              score: 0.95
        - entity: PROJECT_CODENAME
          patterns:
            - regex: "\\b(Project|Operation|Initiative)\\s+[A-Z][a-z]+(?:\\s+[A-Z][a-z]+)*\\b"
              score: 0.7

    gliner:
      model: "urchade/gliner_multi_pii-v1"
      labels:
        - "project codename"
        - "internal tool name"
        - "team name"
        - "building name"
        - "internal product name"
      threshold: 0.5

    anonymizer:
      placeholder_format: "<{entity_type}_{index}>"

    server:
      host: "0.0.0.0"
      port: 8000
      workers: 2
      log_level: "info"
      log_format: "json"
