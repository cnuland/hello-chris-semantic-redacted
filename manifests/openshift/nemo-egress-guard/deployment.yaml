apiVersion: apps/v1
kind: Deployment
metadata:
  name: nemo-egress-guard
  namespace: semantic-redacted
  labels:
    app: nemo-egress-guard
    app.kubernetes.io/name: nemo-egress-guard
    app.kubernetes.io/component: egress-guard
    app.kubernetes.io/part-of: semantic-redacted
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: nemo-egress-guard
  template:
    metadata:
      labels:
        app: nemo-egress-guard
        app.kubernetes.io/name: nemo-egress-guard
        app.kubernetes.io/component: egress-guard
        app.kubernetes.io/part-of: semantic-redacted
    spec:
      serviceAccountName: nemo-egress-guard
      automountServiceAccountToken: false
      containers:
        - name: nemo-egress-guard
          image: image-registry.openshift-image-registry.svc:5000/semantic-redacted/nemo-egress-guard:latest
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8003
              protocol: TCP
              name: http
          env:
            - name: EGRESS_GUARD_QWEN_ENDPOINT
              value: "http://llama-server-qwen36.homelab-maas.svc.cluster.local:8080/v1"
            - name: EGRESS_GUARD_REDACTION_SERVICE_URL
              value: "http://redaction-service.semantic-redacted.svc:8000"
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
